name: Build

'on':
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    name: Windows Release
    runs-on: windows-2022

    env:
      BUILD_TYPE: Release
      QT_VERSION: '6.8.3'
      ARTIFACT_NAME: HWFrontQML-windows-release
      ARTIFACT_FILE: HWFrontQML-windows-release.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.SUBMODULES_TOKEN || github.token }}
          submodules: recursive

      - name: Validate submodule checkout
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($submodule in @('HWConnector', 'DeviceBuilder')) {
            if (-not (Test-Path "$submodule/CMakeLists.txt" -PathType Leaf)) {
              throw "Required submodule '$submodule' was not checked out. If it is private, create a fine-grained PAT with Contents: Read access to Xipypr/$submodule and add it as the SUBMODULES_TOKEN repository secret."
            }
          }

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtdeclarative qtshadertools
          cache: true

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Test-Path deploy -PathType Container)) {
            throw "Deploy directory was not created. Refusing to publish an incomplete artifact."
          }

          Compress-Archive -Path deploy\* -DestinationPath $env:ARTIFACT_FILE -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_FILE }}
          if-no-files-found: error

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = $env:GITHUB_REF_NAME
          $asset = $env:ARTIFACT_FILE

          if (gh release view $tag 2>$null) {
            gh release upload $tag $asset --clobber
          } else {
            gh release create $tag $asset --verify-tag --title $tag --notes "Automated Windows Release build for $tag."
          }
