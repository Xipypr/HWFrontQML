name: Build

'on':
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    name: Windows Release
    runs-on: windows-2022

    env:
      BUILD_TYPE: Release
      QT_VERSION: '6.8.3'
      ARTIFACT_NAME: HWFrontQML-windows-release
      ARTIFACT_FILE: HWFrontQML-windows-release.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout private submodules
        shell: pwsh
        env:
          SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'

          if ([string]::IsNullOrWhiteSpace($env:SUBMODULES_TOKEN)) {
            throw "Required repository secret SUBMODULES_TOKEN is not configured. Create a fine-grained PAT with Contents: Read access to Xipypr/HWConnector and Xipypr/DeviceBuilder, then add it as the SUBMODULES_TOKEN repository secret."
          }

          $authenticatedGitHubUrl = "https://x-access-token:$env:SUBMODULES_TOKEN@github.com/"
          git config --global "url.$authenticatedGitHubUrl.insteadOf" "https://github.com/"

          try {
            git submodule sync --recursive
            git submodule update --init --recursive
          } finally {
            git config --global --unset-all "url.$authenticatedGitHubUrl.insteadOf" 2>$null
            if ($LASTEXITCODE -ne 0) {
              $global:LASTEXITCODE = 0
            }
          }

          foreach ($submodule in @('HWConnector', 'DeviceBuilder')) {
            if (-not (Test-Path "$submodule/CMakeLists.txt" -PathType Leaf)) {
              throw "Required submodule '$submodule' was not checked out. Verify that SUBMODULES_TOKEN has Contents: Read access to Xipypr/$submodule."
            }
          }

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtshadertools
          cache: true

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Validate deploy directory
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Test-Path deploy -PathType Container)) {
            throw "Deploy directory was not created. Refusing to publish an incomplete artifact."
          }

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: deploy/**
          if-no-files-found: error

      - name: Package release archive
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Compress-Archive -Path deploy\* -DestinationPath $env:ARTIFACT_FILE -Force

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = $env:GITHUB_REF_NAME
          $asset = $env:ARTIFACT_FILE

          if (gh release view $tag 2>$null) {
            gh release upload $tag $asset --clobber
          } else {
            gh release create $tag $asset --verify-tag --title $tag --notes "Automated Windows Release build for $tag."
          }
